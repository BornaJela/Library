<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Obriši knjigu</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header bg-danger text-white">
                        <h3>Obriši knjigu</h3>
                    </div>
                    <div class="card-body">
                        <p>Jeste li sigurni da želite obrisati knjigu:</p>
                        <h4>"{{ knjiga.naslov }}"</h4>
                        <form method="post">
                            {% csrf_token %}
                            <button type="submit" class="btn btn-danger">Da, obriši</button>
                            <a href="{% url 'popis_knjiga' %}" class="btn btn-secondary">Odustani</a>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
